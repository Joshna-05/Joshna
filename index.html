<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        /* Modern, minimal styling for the calculator container */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333333;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666666;
            font-weight: 600;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            color: #333333;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: #4fab4f;
        }

        button {
            width: 100%;
            background-color: #4fab4f;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3e8e3e;
        }

        .result-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
        }

        .result-item {
            font-size: 18px;
            color: #444444;
            margin: 8px 0;
        }

        .result-item span {
            font-weight: bold;
            color: #4fab4f;
            font-size: 22px;
        }

        .error {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>Age Calculator</h2>
        
        <div class="input-group">
            <label for="birthdate">Select Date of Birth:</label>
            <!-- Set the max attribute dynamically via JS to prevent selecting future dates -->
            <input type="date" id="birthdate">
        </div>

        <button onclick="calculateAge()">Calculate Age</button>

        <div class="result-box">
            <div id="result">
                <p style="color: #999;">Enter your birthdate above</p>
            </div>
        </div>
    </div>

    <script>
        // Restrict the calendar to only allow past and present dates
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        
        // Format as YYYY-MM-DD and apply to input max attribute
        document.getElementById('birthdate').max = `${yyyy}-${mm}-${dd}`;

        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            const resultDiv = document.getElementById('result');

            // Check if user has picked a date
            if (!birthdateInput) {
                resultDiv.innerHTML = "<p class='error'>Please select a valid date.</p>";
                return;
            }

            const birthDate = new Date(birthdateInput);
            const currentDate = new Date();

            let years = currentDate.getFullYear() - birthDate.getFullYear();
            let months = currentDate.getMonth() - birthDate.getMonth();
            let days = currentDate.getDate() - birthDate.getDate();

            // If day difference is negative, borrow days from previous month
            if (days < 0) {
                months--;
                // Get total days in the previous month
                const previousMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
                days += previousMonth;
            }

            // If month difference is negative, borrow months from previous year
            if (months < 0) {
                years--;
                months += 12;
            }

            // Render result dynamically onto screen
            resultDiv.innerHTML = `
                <div class="result-item"><span>${years}</span> Years</div>
                <div class="result-item"><span>${months}</span> Months</div>
                <div class="result-item"><span>${days}</span> Days</div>
            `;
        }
    </script>

</body>
</html>
